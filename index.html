<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Meine ZEIT</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e60005'/><text x='16' y='24' text-anchor='middle' font-family='Georgia,serif' font-size='26' font-weight='bold' fill='white'>Z</text></svg>">
  <style>
    :root {
      --zeit-red: #e60005;
      --zeit-dark: #1a1a1a;
      --zeit-grey: #767676;
      --zeit-light: #f5f5f5;
      --zeit-border: #d9d9d9;
      --zeit-bg: #ffffff;
      color-scheme: light dark;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --zeit-dark: #e8e8e8;
        --zeit-grey: #999;
        --zeit-light: #1e1e1e;
        --zeit-border: #333;
        --zeit-bg: #121212;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--zeit-bg);
      color: var(--zeit-dark);
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--zeit-bg);
      border-bottom: 3px solid var(--zeit-dark);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--zeit-red); }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-btn {
      background: none;
      border: 1px solid var(--zeit-border);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--zeit-grey);
      cursor: pointer;
      white-space: nowrap;
    }

    .header-btn:active { background: var(--zeit-light); }

    #status {
      text-align: center;
      padding: 40px 16px;
      color: var(--zeit-grey);
      font-size: 14px;
    }

    #articles { padding-bottom: 60px; }

    /* --- Articles --- */
    .article {
      border-bottom: 1px solid var(--zeit-border);
      position: relative;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      max-height: 800px;
    }

    .article-inner {
      display: block;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: transform 0.2s ease;
      background: var(--zeit-bg);
      touch-action: pan-y;
    }

    .article.swiping .article-inner { transition: none; }

    /* Lead article (first, with big image) */
    .article.lead .article-img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      display: block;
    }

    .article.lead .article-body {
      padding: 12px 16px 14px;
    }

    .article.lead .article-title {
      font-size: 22px;
    }

    /* Standard article (text + thumbnail) */
    .article-body {
      display: flex;
      padding: 12px 16px;
      gap: 12px;
    }

    .article-text { flex: 1; min-width: 0; }

    .article-thumb {
      flex: 0 0 100px;
      height: 66px;
      object-fit: cover;
      border-radius: 3px;
      align-self: center;
    }

    /* News ticker articles (no image) */
    .article.newsticker .article-body {
      padding: 10px 16px;
      display: block;
    }

    .article.newsticker .article-title {
      font-size: 15px;
      font-weight: 600;
    }

    /* Swipe backgrounds */
    .swipe-bg, .swipe-bg-right {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      display: flex;
      align-items: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .swipe-bg {
      background: var(--zeit-red);
      justify-content: flex-end;
      padding-right: 24px;
    }

    .swipe-bg-right {
      background: #2a7b2a;
      justify-content: flex-start;
      padding-left: 24px;
    }

    .article.swiping-left .swipe-bg { opacity: 1; }
    .article.swiping-right .swipe-bg-right { opacity: 1; }

    .article-kicker {
      font-size: 12px;
      font-weight: 600;
      color: var(--zeit-red);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }

    .article-title {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--zeit-dark);
    }

    .article-desc {
      font-size: 14px;
      line-height: 1.45;
      color: var(--zeit-grey);
    }

    .article-meta {
      margin-top: 5px;
      font-size: 11px;
      color: #999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .badge-zplus {
      display: inline-block;
      background: #1a1a1a;
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 700;
      vertical-align: middle;
      margin-right: 4px;
    }

    .badge-liveblog {
      display: inline-block;
      background: var(--zeit-red);
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 700;
      vertical-align: middle;
      margin-right: 4px;
    }

    @media (prefers-color-scheme: dark) {
      .badge-zplus {
        background: #e8e8e8;
        color: #121212;
      }
    }

    /* Collapsed bar (shared by read & hidden) */
    .collapsed-bar {
      display: none;
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Read state: collapsed bar, normal look */
    .article.read .article-inner { display: none; }
    .article.read .swipe-bg { display: none; }
    .article.read {
      max-height: 38px;
    }
    .article.read .collapsed-bar {
      display: block;
      color: var(--zeit-dark);
    }
    .article.read .collapsed-bar::before {
      content: "\2713";
      color: #bbb;
      font-size: 11px;
      display: inline-block;
      width: 18px;
      text-align: center;
    }

    /* Read + expanded: show full article again */
    .article.read.expanded {
      max-height: 800px;
    }
    .article.read.expanded .article-inner { display: block; }
    .article.read.expanded .collapsed-bar { display: none; }
    .article.read.expanded .swipe-bg { display: block; }

    /* Hidden state: collapsed bar, muted */
    .article.hidden {
      max-height: 38px;
      opacity: 0.5;
    }
    .article.hidden .article-inner { display: none; }
    .article.hidden .swipe-bg { display: none; }
    .article.hidden .collapsed-bar {
      display: block;
      color: #aaa;
    }
    .article.hidden .collapsed-bar::before {
      content: "\25B6";
      font-size: 8px;
      vertical-align: middle;
      color: #ccc;
      display: inline-block;
      width: 18px;
      text-align: center;
    }
    /* Hidden wins over read styling */
    .article.hidden.read .collapsed-bar {
      color: #aaa;
    }
    .article.hidden.read .collapsed-bar::before {
      content: "\25B6";
      font-size: 8px;
      vertical-align: middle;
      color: #ccc;
      display: inline-block;
      width: 18px;
      text-align: center;
    }

    /* Last-visited indicator */
    .article.last-visited {
      border-bottom: 3px solid var(--zeit-red);
      animation: fade-marker 3s ease forwards;
    }
    @keyframes fade-marker {
      0%, 50% { border-bottom-color: var(--zeit-red); }
      100% { border-bottom-color: transparent; }
    }

    /* Slide-out animation */
    .article.sliding-out .article-inner {
      transform: translateX(-110%);
      transition: transform 0.3s ease;
    }
    .article.sliding-out .swipe-bg { opacity: 1; }

    /* Section dividers */
    .section-label {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--zeit-grey);
      background: var(--zeit-light);
      border-bottom: 1px solid var(--zeit-border);
    }

    .error-msg {
      color: var(--zeit-red);
      padding: 20px 16px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--zeit-border);
      border-top-color: var(--zeit-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Article-level loading overlay */
    .article.checking .article-inner::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 16px;
      width: 16px;
      height: 16px;
      margin-top: -8px;
      border: 2px solid var(--zeit-border);
      border-top-color: var(--zeit-red);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
  </style>
</head>
<body>
  <header>
    <h1>Meine <span>ZEIT</span></h1>
    <div class="header-actions">
      <button class="header-btn" id="btn-unhide-all">Alle zeigen</button>
      <button class="header-btn" id="btn-refresh">&#8635;</button>
    </div>
  </header>

  <div id="status"><div class="loading-spinner"></div><br>Lade Artikel&hellip;</div>
  <div id="articles"></div>

  <script type="module" src="app.js"></script>
</body>
</html>
