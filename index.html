<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>Meine ZEIT</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23e60005'/><text x='16' y='24' text-anchor='middle' font-family='Georgia,serif' font-size='26' font-weight='bold' fill='white'>Z</text></svg>">
  <style>
    :root {
      --zeit-red: #e60005;
      --zeit-dark: #1a1a1a;
      --zeit-grey: #767676;
      --zeit-light: #f5f5f5;
      --zeit-border: #d9d9d9;
      --zeit-bg: #ffffff;
      color-scheme: light dark;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --zeit-dark: #e8e8e8;
        --zeit-grey: #999;
        --zeit-light: #1e1e1e;
        --zeit-border: #333;
        --zeit-bg: #121212;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--zeit-bg);
      color: var(--zeit-dark);
      -webkit-text-size-adjust: 100%;
      overflow-x: hidden;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--zeit-bg);
      border-bottom: 3px solid var(--zeit-dark);
      padding: 10px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    header h1 {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: -0.5px;
    }

    header h1 span { color: var(--zeit-red); }

    .header-actions {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .header-btn {
      background: none;
      border: 1px solid var(--zeit-border);
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      color: var(--zeit-grey);
      cursor: pointer;
      white-space: nowrap;
    }

    .header-btn:active { background: var(--zeit-light); }

    #status {
      text-align: center;
      padding: 40px 16px;
      color: var(--zeit-grey);
      font-size: 14px;
    }

    #articles { padding-bottom: 60px; }

    /* --- Articles --- */
    .article {
      border-bottom: 1px solid var(--zeit-border);
      position: relative;
      overflow: hidden;
      transition: max-height 0.3s ease, opacity 0.3s ease;
      max-height: 800px;
    }

    .article-inner {
      display: block;
      text-decoration: none;
      color: inherit;
      position: relative;
      transition: transform 0.2s ease;
      background: var(--zeit-bg);
    }

    .article.swiping .article-inner { transition: none; }

    /* Lead article (first, with big image) */
    .article.lead .article-img {
      width: 100%;
      max-height: 300px;
      object-fit: cover;
      display: block;
    }

    .article.lead .article-body {
      padding: 12px 16px 14px;
    }

    .article.lead .article-title {
      font-size: 22px;
    }

    /* Standard article (text + thumbnail) */
    .article-body {
      display: flex;
      padding: 12px 16px;
      gap: 12px;
    }

    .article-text { flex: 1; min-width: 0; }

    .article-thumb {
      flex: 0 0 100px;
      height: 66px;
      object-fit: cover;
      border-radius: 3px;
      align-self: center;
    }

    /* News ticker articles (no image) */
    .article.newsticker .article-body {
      padding: 10px 16px;
      display: block;
    }

    .article.newsticker .article-title {
      font-size: 15px;
      font-weight: 600;
    }

    /* Swipe backgrounds */
    .swipe-bg, .swipe-bg-right {
      position: absolute;
      top: 0; right: 0; bottom: 0; left: 0;
      display: flex;
      align-items: center;
      color: white;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.2s;
      pointer-events: none;
    }

    .swipe-bg {
      background: var(--zeit-red);
      justify-content: flex-end;
      padding-right: 24px;
    }

    .swipe-bg-right {
      background: #2a7b2a;
      justify-content: flex-start;
      padding-left: 24px;
    }

    .article.swiping-left .swipe-bg { opacity: 1; }
    .article.swiping-right .swipe-bg-right { opacity: 1; }

    .article-kicker {
      font-size: 12px;
      font-weight: 600;
      color: var(--zeit-red);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-bottom: 3px;
    }

    .article-title {
      font-family: Georgia, "Times New Roman", Times, serif;
      font-size: 17px;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 4px;
      color: var(--zeit-dark);
    }

    .article-desc {
      font-size: 14px;
      line-height: 1.45;
      color: var(--zeit-grey);
    }

    .article-meta {
      margin-top: 5px;
      font-size: 11px;
      color: #999;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .badge-zplus {
      display: inline-block;
      background: #1a1a1a;
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 700;
      vertical-align: middle;
      margin-right: 4px;
    }

    .badge-liveblog {
      display: inline-block;
      background: var(--zeit-red);
      color: white;
      border-radius: 3px;
      padding: 1px 5px;
      font-size: 10px;
      font-weight: 700;
      vertical-align: middle;
      margin-right: 4px;
    }

    @media (prefers-color-scheme: dark) {
      .badge-zplus {
        background: #e8e8e8;
        color: #121212;
      }
    }

    /* Collapsed bar (shared by read & hidden) */
    .collapsed-bar {
      display: none;
      padding: 9px 16px;
      font-size: 13px;
      cursor: pointer;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Read state: collapsed bar, normal look */
    .article.read .article-inner { display: none; }
    .article.read .swipe-bg { display: none; }
    .article.read {
      max-height: 38px;
    }
    .article.read .collapsed-bar {
      display: block;
      color: var(--zeit-dark);
    }
    .article.read .collapsed-bar::before {
      content: "\2713";
      color: #bbb;
      font-size: 11px;
      display: inline-block;
      width: 18px;
      text-align: center;
    }

    /* Read + expanded: show full article again */
    .article.read.expanded {
      max-height: 800px;
    }
    .article.read.expanded .article-inner { display: block; }
    .article.read.expanded .collapsed-bar { display: none; }
    .article.read.expanded .swipe-bg { display: block; }

    /* Hidden state: collapsed bar, muted */
    .article.hidden {
      max-height: 38px;
      opacity: 0.5;
    }
    .article.hidden .article-inner { display: none; }
    .article.hidden .swipe-bg { display: none; }
    .article.hidden .collapsed-bar {
      display: block;
      color: #aaa;
    }
    .article.hidden .collapsed-bar::before {
      content: "\25B6";
      font-size: 8px;
      vertical-align: middle;
      color: #ccc;
      display: inline-block;
      width: 18px;
      text-align: center;
    }
    /* Hidden wins over read styling */
    .article.hidden.read .collapsed-bar {
      color: #aaa;
    }
    .article.hidden.read .collapsed-bar::before {
      content: "\25B6";
      font-size: 8px;
      vertical-align: middle;
      color: #ccc;
      display: inline-block;
      width: 18px;
      text-align: center;
    }

    /* Last-visited indicator */
    .article.last-visited {
      border-bottom: 3px solid var(--zeit-red);
      animation: fade-marker 3s ease forwards;
    }
    @keyframes fade-marker {
      0%, 50% { border-bottom-color: var(--zeit-red); }
      100% { border-bottom-color: transparent; }
    }

    /* Slide-out animation */
    .article.sliding-out .article-inner {
      transform: translateX(-110%);
      transition: transform 0.3s ease;
    }
    .article.sliding-out .swipe-bg { opacity: 1; }

    /* Section dividers */
    .section-label {
      padding: 10px 16px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--zeit-grey);
      background: var(--zeit-light);
      border-bottom: 1px solid var(--zeit-border);
    }

    .error-msg {
      color: var(--zeit-red);
      padding: 20px 16px;
      text-align: center;
      font-size: 14px;
      line-height: 1.6;
    }

    .loading-spinner {
      display: inline-block;
      width: 20px;
      height: 20px;
      border: 2px solid var(--zeit-border);
      border-top-color: var(--zeit-red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Article-level loading overlay */
    .article.checking .article-inner::after {
      content: "";
      position: absolute;
      top: 50%;
      right: 16px;
      width: 16px;
      height: 16px;
      margin-top: -8px;
      border: 2px solid var(--zeit-border);
      border-top-color: var(--zeit-red);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }
  </style>
</head>
<body>
  <header>
    <h1>Meine <span>ZEIT</span></h1>
    <div class="header-actions">
      <button class="header-btn" id="btn-unhide-all">Alle zeigen</button>
      <button class="header-btn" id="btn-refresh">&#8635;</button>
    </div>
  </header>

  <div id="status"><div class="loading-spinner"></div><br>Lade Artikel&hellip;</div>
  <div id="articles"></div>

  <script>
    // --- Configuration ---
    const ZEIT_BASE = "https://www.zeit.de";

    const CORS_PROXIES = [
      url => `https://cors.nomeata.de/proxy/${url.replace('https://', '')}`,
    ];

    const LS_READ   = "mz_read";
    const LS_HIDDEN = "mz_hidden";
    const SS_CACHE  = "mz_cache";
    const SS_LAST   = "mz_last";
    const CACHE_MAX_AGE = 20 * 60 * 1000; // 20 minutes

    let articles = [];

    // --- LocalStorage helpers ---
    function getSet(key) {
      try { return new Set(JSON.parse(localStorage.getItem(key) || "[]")); }
      catch { return new Set(); }
    }

    function saveSet(key, set) {
      const arr = [...set];
      if (arr.length > 3000) arr.splice(0, arr.length - 3000);
      localStorage.setItem(key, JSON.stringify(arr));
    }

    function markRead(id) {
      const s = getSet(LS_READ); s.add(id); saveSet(LS_READ, s);
    }

    function markUnread(id) {
      const s = getSet(LS_READ); s.delete(id); saveSet(LS_READ, s);
    }

    function toggleHidden(id) {
      const s = getSet(LS_HIDDEN);
      if (s.has(id)) s.delete(id); else s.add(id);
      saveSet(LS_HIDDEN, s);
      return s.has(id);
    }

    function unhideAll() {
      localStorage.setItem(LS_HIDDEN, "[]");
    }

    // --- Fetch via CORS proxy ---
    async function fetchPage(url) {
      let lastError;
      for (const mkProxy of CORS_PROXIES) {
        try {
          const resp = await fetch(mkProxy(url), { signal: AbortSignal.timeout(15000) });
          if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
          const text = await resp.text();
          if (text.startsWith('{"error"')) throw new Error(text);
          return text;
        } catch (e) {
          lastError = e;
        }
      }
      throw lastError;
    }

    // --- Parse zeit.de HTML into article objects ---
    function parseZeitHTML(html) {
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, "text/html");
      const result = [];
      const seen = new Set();

      // 1) Full teasers (zon-teaser)
      doc.querySelectorAll("article.zon-teaser").forEach((el, i) => {
        const linkEl = el.querySelector("a.zon-teaser__link");
        if (!linkEl) return;

        let href = linkEl.getAttribute("href") || "";
        if (href.startsWith("/")) href = ZEIT_BASE + href;
        if (!href.includes("zeit.de")) return;

        // Skip podcasts and wochenmarkt
        if (el.querySelector('.audio-player[data-audio-type="podcast"]')) return;
        if (/podcast|wochenmarkt/i.test(href)) return;

        const id = href.replace(/https?:\/\//, "").replace(/[^a-z0-9]/gi, "_");
        if (seen.has(id)) return;
        seen.add(id);

        const kicker = el.querySelector(".zon-teaser__kicker-text")?.textContent?.trim() || "";
        const title = el.querySelector(".zon-teaser__title")?.textContent?.trim() || "";
        const summary = el.querySelector(".zon-teaser__summary")?.textContent?.trim() || "";
        const isZPlus = el.hasAttribute("data-zplus") || !!el.querySelector(".zplus-logo");
        const isLiveblog = /liveblog/i.test(href) || /liveblog/i.test(kicker);

        // Get the smallest reasonable image
        let image = "";
        const img = el.querySelector("img.zon-teaser__media-item");
        if (img) {
          image = img.getAttribute("src") || "";
          // Try to get a smaller variant from srcset or source
          const source = el.querySelector("picture source[media='(max-width: 360px)']");
          if (source) {
            const srcset = source.getAttribute("srcset") || "";
            image = srcset.split(",")[0].trim().split(" ")[0] || image;
          }
        }

        const isLead = i === 0;

        result.push({ id, link: href, kicker, title, summary, image, isZPlus, isLiveblog, type: isLead ? "lead" : "teaser" });
      });

      // 2) News tickers (zon-newsteaser)
      doc.querySelectorAll("article.zon-newsteaser").forEach(el => {
        const linkEl = el.querySelector("a.zon-newsteaser__link");
        if (!linkEl) return;

        let href = linkEl.getAttribute("href") || "";
        if (href.startsWith("/")) href = ZEIT_BASE + href;
        if (!href.includes("zeit.de")) return;

        // Skip podcasts and wochenmarkt
        if (/podcast|wochenmarkt/i.test(href)) return;

        const id = href.replace(/https?:\/\//, "").replace(/[^a-z0-9]/gi, "_");
        if (seen.has(id)) return;
        seen.add(id);

        const kicker = el.querySelector(".zon-newsteaser__kicker")?.textContent?.trim() || "";
        const title = el.querySelector(".zon-newsteaser__title")?.textContent?.trim() || "";

        const timeEl = el.querySelector(".zon-newsteaser__time");
        const timeText = timeEl?.textContent?.trim() || "";
        const datetime = timeEl?.getAttribute("datetime") || "";

        const isLiveblog = /liveblog/i.test(href) || /liveblog/i.test(kicker);
        result.push({ id, link: href, kicker, title, summary: "", image: "", isZPlus: false, isLiveblog, type: "news", timeText, datetime });
      });

      return result;
    }

    // --- Komplettansicht check ---
    const LS_KOMPLETT = "mz_komplett"; // cache: url -> true/false

    function getKomplettCache() {
      try { return JSON.parse(localStorage.getItem(LS_KOMPLETT) || "{}"); }
      catch { return {}; }
    }

    function setKomplettCache(url, hasIt) {
      const cache = getKomplettCache();
      cache[url] = hasIt;
      // Keep cache bounded
      const keys = Object.keys(cache);
      if (keys.length > 1000) {
        for (const k of keys.slice(0, keys.length - 1000)) delete cache[k];
      }
      localStorage.setItem(LS_KOMPLETT, JSON.stringify(cache));
    }

    // URLs that never have /komplettansicht
    function skipKomplettCheck(url) {
      return /liveblog|podcast|video|\/news\//.test(url);
    }

    // Try HEAD on /komplettansicht, fall back to regular URL
    async function resolveArticleURL(url) {
      const clean = url.replace(/\/+$/, "");
      if (skipKomplettCheck(clean)) return clean;

      const cache = getKomplettCache();
      if (clean in cache) {
        return cache[clean] ? clean + "/komplettansicht" : clean;
      }

      const komplettUrl = clean + "/komplettansicht";
      for (const mkProxy of CORS_PROXIES) {
        try {
          const resp = await fetch(mkProxy(komplettUrl), {
            method: "HEAD",
            signal: AbortSignal.timeout(5000),
          });
          const hasIt = resp.ok;
          setKomplettCache(clean, hasIt);
          return hasIt ? komplettUrl : clean;
        } catch {
          // proxy might not support HEAD, try next
        }
      }

      // All proxies failed — just use the regular URL
      setKomplettCache(clean, false);
      return clean;
    }

    // --- Format time ---
    function formatTime(datetime, timeText) {
      if (timeText) return timeText;
      if (!datetime) return "";
      try {
        const date = new Date(datetime);
        const now = new Date();
        const diffMins = Math.floor((now - date) / 60000);
        if (diffMins < 1) return "gerade eben";
        if (diffMins < 60) return `vor ${diffMins} Min.`;
        const diffHours = Math.floor(diffMins / 60);
        if (diffHours < 24) return `vor ${diffHours} Std.`;
        const diffDays = Math.floor(diffHours / 24);
        if (diffDays === 1) return "gestern";
        if (diffDays < 7) return `vor ${diffDays} Tagen`;
        return date.toLocaleDateString("de-DE", { day: "numeric", month: "short" });
      } catch { return ""; }
    }

    // --- Escape HTML ---
    function esc(s) {
      const d = document.createElement("div");
      d.textContent = s;
      return d.innerHTML;
    }

    // --- Render ---
    function render() {
      const container = document.getElementById("articles");
      const readSet = getSet(LS_READ);
      const hiddenSet = getSet(LS_HIDDEN);

      // Separate lead teasers, regular teasers, and news
      const leads = articles.filter(a => a.type === "lead");
      const teasers = articles.filter(a => a.type === "teaser");
      const news = articles.filter(a => a.type === "news");

      let html = "";

      // Render all articles in order, with a section label before news
      const allArticles = [...leads, ...teasers];
      if (news.length > 0) {
        allArticles.push({ type: "_label", text: "Newsticker" });
        allArticles.push(...news);
      }

      for (const a of allArticles) {
        if (a.type === "_label") {
          html += `<div class="section-label">${esc(a.text)}</div>`;
          continue;
        }

        const cls = [
          "article",
          a.type === "lead" ? "lead" : "",
          a.type === "news" ? "newsticker" : "",
          a.isLiveblog ? "liveblog" : "",
          (!a.isLiveblog && readSet.has(a.id)) ? "read" : "",
          hiddenSet.has(a.id) ? "hidden" : "",
        ].filter(Boolean).join(" ");

        const zplusBadge = a.isZPlus ? '<span class="badge-zplus">Z+</span>' : "";
        const liveblogBadge = a.isLiveblog ? '<span class="badge-liveblog">Live</span>' : "";
        const href = esc(a.link);
        const time = formatTime(a.datetime, a.timeText);

        const badges = liveblogBadge + zplusBadge;

        if (a.type === "lead" && a.image) {
          // Lead: big image on top
          html += `<div class="${cls}" data-id="${esc(a.id)}">
  <div class="swipe-bg">Ausblenden</div>
  <div class="swipe-bg-right">Öffnen</div>
  <a class="article-inner" href="${href}">
    <img class="article-img" src="${esc(a.image)}" alt="" loading="lazy">
    <div class="article-body">
      <div class="article-text">
        ${a.kicker ? `<div class="article-kicker">${badges}${esc(a.kicker)}</div>` : (badges ? `<div class="article-kicker">${badges}</div>` : "")}
        <div class="article-title">${esc(a.title)}</div>
        ${a.summary ? `<div class="article-desc">${esc(a.summary)}</div>` : ""}
        <div class="article-meta">
        </div>
      </div>
    </div>
  </a>
  <div class="collapsed-bar">${esc(a.title)}</div>
</div>`;
        } else if (a.type === "news") {
          // Newsticker: compact, no image
          html += `<div class="${cls}" data-id="${esc(a.id)}">
  <div class="swipe-bg">Ausblenden</div>
  <div class="swipe-bg-right">Öffnen</div>
  <a class="article-inner" href="${href}">
    <div class="article-body">
      <div class="article-text">
        ${a.kicker ? `<div class="article-kicker">${esc(a.kicker)}</div>` : ""}
        <div class="article-title">${esc(a.title)}</div>
        ${time ? `<div class="article-meta"><span>${esc(time)}</span></div>` : ""}
      </div>
    </div>
  </a>
  <div class="collapsed-bar">${esc(a.title)}</div>
</div>`;
        } else {
          // Standard teaser: text + optional thumbnail
          html += `<div class="${cls}" data-id="${esc(a.id)}">
  <div class="swipe-bg">Ausblenden</div>
  <div class="swipe-bg-right">Öffnen</div>
  <a class="article-inner" href="${href}">
    <div class="article-body">
      <div class="article-text">
        ${a.kicker ? `<div class="article-kicker">${badges}${esc(a.kicker)}</div>` : (badges ? `<div class="article-kicker">${badges}</div>` : "")}
        <div class="article-title">${esc(a.title)}</div>
        ${a.summary ? `<div class="article-desc">${esc(a.summary)}</div>` : ""}
        <div class="article-meta">
        </div>
      </div>
      ${a.image ? `<img class="article-thumb" src="${esc(a.image)}" alt="" loading="lazy">` : ""}
    </div>
  </a>
  <div class="collapsed-bar">${esc(a.title)}</div>
</div>`;
        }
      }

      container.innerHTML = html;
      attachListeners();
    }

    // --- Open article: resolve URL, mark read, collapse only when user returns ---
    async function openArticle(el) {
      const baseURL = el.querySelector(".article-inner")?.getAttribute("href");
      if (!baseURL) return;

      const isLiveblog = el.classList.contains("liveblog");

      // Mark read in storage but don't collapse yet (skip for liveblogs)
      if (!isLiveblog) markRead(el.dataset.id);
      sessionStorage.setItem(SS_LAST, el.dataset.id);
      setCachedArticles(articles); // refresh cache timestamp on navigation

      el.classList.add("checking");
      let finalURL;
      try {
        finalURL = await resolveArticleURL(baseURL);
      } catch {
        finalURL = baseURL;
      }
      el.classList.remove("checking");

      window.location.href = finalURL;
    }

    function attachListeners() {
      document.querySelectorAll("#articles .article").forEach(el => {
        setupSwipe(el);

        el.querySelector(".article-inner")?.addEventListener("click", (e) => {
          e.preventDefault();
          if (el.classList.contains("checking")) return;
          openArticle(el);
        });

        el.querySelector(".collapsed-bar")?.addEventListener("click", (e) => {
          e.preventDefault();
          e.stopPropagation();
          if (el.classList.contains("hidden")) {
            toggleHidden(el.dataset.id);
            markUnread(el.dataset.id);
          } else if (el.classList.contains("read")) {
            markUnread(el.dataset.id);
          }
          render();
        });
      });
    }

    // --- Swipe handling ---
    function setupSwipe(el) {
      let startX, startY, currentX, isDragging = false, isHorizontal = null;
      const inner = el.querySelector(".article-inner");
      if (!inner) return;

      inner.addEventListener("touchstart", (e) => {
        if (el.classList.contains("hidden") || (el.classList.contains("read") && !el.classList.contains("expanded"))) return;
        const t = e.touches[0];
        startX = t.clientX;
        startY = t.clientY;
        currentX = startX;
        isDragging = true;
        isHorizontal = null;
      }, { passive: true });

      inner.addEventListener("touchmove", (e) => {
        if (!isDragging) return;
        const t = e.touches[0];
        currentX = t.clientX;
        const diffX = startX - currentX; // positive = left swipe, negative = right swipe
        const diffY = Math.abs(t.clientY - startY);

        if (isHorizontal === null && (Math.abs(diffX) > 10 || diffY > 10)) {
          isHorizontal = Math.abs(diffX) > diffY;
        }

        if (!isHorizontal) {
          isDragging = false;
          el.classList.remove("swiping-left", "swiping-right");
          inner.style.transform = "";
          return;
        }

        e.preventDefault();
        if (diffX > 0) {
          // Left swipe (hide)
          el.classList.add("swiping-left");
          el.classList.remove("swiping-right");
          inner.style.transform = `translateX(${-diffX}px)`;
        } else {
          // Right swipe (open)
          el.classList.add("swiping-right");
          el.classList.remove("swiping-left");
          inner.style.transform = `translateX(${-diffX}px)`;
        }
      }, { passive: false });

      const onEnd = () => {
        if (!isDragging) return;
        isDragging = false;
        const diffX = startX - currentX;

        if (isHorizontal && diffX > 100) {
          // Left swipe: hide
          el.classList.remove("swiping-left", "swiping-right");
          el.classList.add("sliding-out");
          inner.style.transform = "";
          setTimeout(() => {
            toggleHidden(el.dataset.id);
            el.classList.remove("sliding-out");
            el.classList.add("hidden");
          }, 300);
        } else if (isHorizontal && diffX < -100) {
          // Right swipe: keep swiped open while loading
          el.classList.remove("swiping-left");
          el.classList.add("swiping-right");
          inner.style.transform = `translateX(${-diffX}px)`;
          openArticle(el);
        } else {
          el.classList.remove("swiping-left", "swiping-right");
          inner.style.transform = "";
        }
      };

      inner.addEventListener("touchend", onEnd, { passive: true });
      inner.addEventListener("touchcancel", onEnd, { passive: true });
    }

    // --- Session cache ---
    function getCachedArticles() {
      try {
        const { ts, data } = JSON.parse(sessionStorage.getItem(SS_CACHE));
        return (Date.now() - ts < CACHE_MAX_AGE) ? data : null;
      } catch { return null; }
    }

    function setCachedArticles(data) {
      try { sessionStorage.setItem(SS_CACHE, JSON.stringify({ ts: Date.now(), data })); }
      catch { /* quota */ }
    }

    // --- Load articles ---
    async function loadSection(forceRefresh) {
      const statusEl = document.getElementById("status");
      const articlesEl = document.getElementById("articles");

      if (!forceRefresh) {
        const cached = getCachedArticles();
        if (cached) {
          articles = cached;
          statusEl.style.display = "none";
          render();
          highlightLast();
          return;
        }
      }

      statusEl.innerHTML = '<div class="loading-spinner"></div><br>Lade Artikel&hellip;';
      statusEl.style.display = "block";
      articlesEl.innerHTML = "";

      const url = ZEIT_BASE + "/index";

      try {
        const html = await fetchPage(url);
        articles = parseZeitHTML(html);
        setCachedArticles(articles);
        statusEl.style.display = "none";

        if (articles.length === 0) {
          statusEl.innerHTML = "Keine Artikel gefunden.";
          statusEl.style.display = "block";
        } else {
          render();
          highlightLast();
        }
      } catch (e) {
        statusEl.innerHTML = `<div class="error-msg">
          Artikel konnten nicht geladen werden.<br>
          <small style="color: var(--zeit-grey)">${esc(e.message || String(e))}</small><br><br>
          <button class="header-btn" onclick="loadSection()">Erneut versuchen</button>
        </div>`;
        statusEl.style.display = "block";
        console.error("Fetch failed:", e);
      }
    }

    // --- Highlight last-visited article ---
    function highlightLast() {
      const lastId = sessionStorage.getItem(SS_LAST);
      if (!lastId) return;
      const el = document.querySelector(`.article[data-id="${CSS.escape(lastId)}"]`);
      if (el) el.classList.add("last-visited");
      sessionStorage.removeItem(SS_LAST);
    }

    // --- Button handlers ---
    document.getElementById("btn-refresh").addEventListener("click", () => loadSection(true));
    document.getElementById("btn-unhide-all").addEventListener("click", () => {
      unhideAll();
      document.querySelectorAll(".article.hidden").forEach(el => el.classList.remove("hidden"));
    });

    // --- Init ---
    loadSection();

    // Re-render on back navigation (bfcache) to reflect read state
    window.addEventListener("pageshow", (e) => {
      if (e.persisted && articles.length > 0) {
        render();
        highlightLast();
      }
    });
  </script>
</body>
</html>
